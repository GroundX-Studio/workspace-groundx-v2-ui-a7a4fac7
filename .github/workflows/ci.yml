name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  scaffold:
    name: Scaffold build and test
    runs-on: ubuntu-latest
    # The e2e step boots the middleware in REAL mode against the live GroundX
    # backend (there is no MOCK_MODE — 2026-06-01-retire-mock-mode). Targeting
    # the `dev` environment resolves the env-scoped GROUNDX_PARTNER_API_KEY
    # secret (it is set as BOTH an org secret AND a `dev`-environment secret).
    environment: dev
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate local env setup contract
        run: npm run test:setup-env

      - name: Scan for committed secrets
        run: npm run scan:secrets

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

      # Local-dev-boot guard: builds @groundx/shared, boots middleware (tsx) +
      # app (Vite), and drives the /api flow (onboarding session, login, the
      # authed read endpoints + a CSRF-protected POST). Catches dev-runtime
      # resolution + auth/CSRF regressions the unit suite can't see.
      - name: Dev smoke (boot servers + /api flow)
        run: npm run verify:preview

      - name: Install Playwright browser
        run: npm --workspace app exec -- playwright install --with-deps chromium

      # The e2e suite boots the middleware in REAL mode against the live GroundX
      # backend (no MOCK_MODE). Fail LOUDLY if the Partner key secret is absent —
      # never let the suite pass "quietly green" because it ran without GroundX.
      # The deterministic e2e data is the seeded sample doc c3bfff49 in bucket
      # 28454. The secret is referenced from the `dev` environment (job-level
      # `environment: dev` above resolves the env-scoped secret).
      - name: Browser smoke tests
        env:
          GROUNDX_PARTNER_API_KEY: ${{ secrets.GROUNDX_PARTNER_API_KEY }}
          GROUNDX_BASE_URL: ${{ vars.GROUNDX_BASE_URL || 'https://api.groundx.ai/api/v1' }}
          GROUNDX_SAMPLES_BUCKET_ID: "28454"
        run: |
          if [ -z "${GROUNDX_PARTNER_API_KEY}" ]; then
            echo "::error::GROUNDX_PARTNER_API_KEY is not set. The e2e suite runs against REAL GroundX and must not pass without it. Configure the secret on the 'dev' environment (and org)."
            exit 1
          fi
          npm run test:e2e

  container-images:
    name: Build container images
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      # Builds both images end-to-end — catches container-only regressions the
      # unit suite can't see (e.g. the @groundx/shared workspace wiring across
      # the multi-stage deps/build/runtime layers, incl. `npm ci --omit=dev`).
      - name: Build middleware image
        run: docker build -f Dockerfile.middleware -t gx-middleware:ci .

      - name: Verify @groundx/shared resolves in the middleware runtime image
        run: |
          docker run --rm --entrypoint node gx-middleware:ci \
            -e "import('@groundx/shared').then((m) => { if (typeof m.parseCitations !== 'function') { console.error('shared did not resolve'); process.exit(1); } console.log('@groundx/shared OK'); }).catch((e) => { console.error(e); process.exit(1); })"

      - name: Build frontend image
        run: docker build -f Dockerfile.frontend -t gx-frontend:ci .
